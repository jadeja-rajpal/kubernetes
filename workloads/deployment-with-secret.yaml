apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-secret-demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: nginx-secret

  template:
    metadata:
      labels:
        app: nginx-secret

    spec:
      containers:
      - name: nginx
        image: nginx

        env:
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: username

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: password
